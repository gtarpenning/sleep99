name: TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "TestFlight changelog"
        required: false
        default: "Manual build"

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  build:
    name: Build & Upload
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SSH agent (match certs repo)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Unlock keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      - name: Fastlane beta
        env:
          ASC_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:  ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD:   ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL:    git@github.com:gtarpenning/sleep-tune-certs.git
          RELEASE_NOTES:    ${{ github.event.inputs.release_notes || format('commit {0}', github.sha) }}
          GIT_AUTHOR_NAME:     "ci-bot"
          GIT_AUTHOR_EMAIL:    "ci@sleep-tune.app"
          GIT_COMMITTER_NAME:  "ci-bot"
          GIT_COMMITTER_EMAIL: "ci@sleep-tune.app"
        run: bundle exec fastlane beta

      - name: Upload IPA (debug artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SleepTune-${{ github.run_number }}.ipa
          path: build_output/SleepTune.ipa
          retention-days: 7
